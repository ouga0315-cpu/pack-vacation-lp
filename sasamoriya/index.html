// localStorage の言語選択に従って自動リダイレクト
(function(){
  var lang = 'ja';
  try {
    var saved = localStorage.getItem('packVacationLang');
    if (saved === 'en' || saved === 'ja') lang = saved;
    else {
      // 初訪問はブラウザ言語で判定
      var nav = (navigator.language || navigator.userLanguage || 'ja').toLowerCase();
      if (nav.indexOf('en') === 0) lang = 'en';
    }
  } catch(e) {}
  window.location.replace(lang + '/');
})();
