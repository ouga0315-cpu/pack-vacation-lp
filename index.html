<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pack Vacation | 安曇野の宿</title>
  <meta name="description" content="Pack Vacation — 安曇野・松本エリアの小さな宿。一棟貸しログハウス「民宿笹森家」と少人数ゲストハウス「灯」。">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@300;400;700&display=swap" rel="stylesheet">

  <script async src="https://www.googletagmanager.com/gtag/js?id=G-2RVQXQ0S68"></script>

  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Zen Kaku Gothic New', sans-serif;
      color: #fff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow-x: hidden;
    }

    /* Background Slideshow */
    .bg {
      position: fixed;
      inset: 0;
      z-index: -2;
    }
    .bg-slide {
      position: absolute;
      inset: 0;
      background-size: cover;
      background-position: center;
      opacity: 0;
      transition: opacity 2s ease-in-out;
    }
    .bg-slide.active {
      opacity: 1;
    }
    .bg::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(40,60,40,0.4), rgba(30,30,50,0.4));
      z-index: 1;
    }
    .bg-overlay {
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.4);
      z-index: 2;
    }

    /* Layout */
    .container {
      width: 100%;
      max-width: 900px;
      padding: 48px 24px;
      text-align: center;
    }

    /* Header */
    .brand {
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      color: #fff;
      margin-bottom: 8px;
    }
    .tagline {
      font-size: 0.95rem;
      color: rgba(255,255,255,0.55);
      letter-spacing: 0.18em;
      margin-bottom: 56px;
      font-weight: 300;
    }

    /* Cards */
    .cards {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 24px;
      margin-bottom: 48px;
    }

    .card {
      position: relative;
      border-radius: 16px;
      overflow: hidden;
      text-decoration: none;
      color: #fff;
      transition: transform 0.3s ease, box-shadow 0.3s ease;
      aspect-ratio: 3/4;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
    }
    .card:hover {
      transform: translateY(-4px);
      box-shadow: 0 16px 48px rgba(0,0,0,0.4);
    }

    .card-img {
      position: absolute;
      inset: 0;
      background-size: cover;
      background-position: center;
      z-index: 0;
      transition: transform 0.5s ease;
    }
    .card:hover .card-img {
      transform: scale(1.05);
    }

    .card::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(to top, rgba(0,0,0,0.75) 0%, rgba(0,0,0,0.1) 50%, transparent 100%);
      z-index: 1;
    }

    .card-body {
      position: relative;
      z-index: 2;
      padding: 28px 20px;
    }

    .card-label {
      display: inline-block;
      font-size: 0.65rem;
      letter-spacing: 0.18em;
      padding: 4px 14px;
      border-radius: 20px;
      margin-bottom: 12px;
      font-weight: 400;
    }
    .card--sasa .card-label { background: #4a6741; }
    .card--tomo .card-label { background: #5a4a3a; }

    .card-title {
      font-size: 1.35rem;
      font-weight: 700;
      margin-bottom: 6px;
      line-height: 1.3;
    }

    .card-sub {
      font-size: 0.8rem;
      color: rgba(255,255,255,0.7);
      letter-spacing: 0.05em;
      margin-bottom: 16px;
      line-height: 1.6;
    }

    .card-cta {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 0.8rem;
      font-weight: 700;
      letter-spacing: 0.05em;
      color: #fff;
      transition: gap 0.2s ease;
    }
    .card:hover .card-cta { gap: 10px; }
    .card-cta::after {
      content: '→';
      font-size: 1rem;
    }

    /* Footer */
    .footer-copy {
      font-size: 0.75rem;
      color: rgba(255,255,255,0.3);
      letter-spacing: 0.05em;
    }

    /* Responsive */
    @media (max-width: 640px) {
      .cards {
        grid-template-columns: 1fr;
        gap: 20px;
      }
      .card { aspect-ratio: 4/3; }
      .brand { font-size: 1.6rem; }
      .tagline { margin-bottom: 40px; }
      .container { padding: 32px 16px; }
    }
  </style>
</head>
<body>
  <div class="bg">
    <div class="bg-slide active"></div>
    <div class="bg-slide"></div>
    <div class="bg-overlay"></div>
  </div>
  <div class="container">
    <h1 class="brand">Pack Vacation</h1>
    <p class="tagline">安曇野のちいさな宿</p>

    <div class="cards">
      <a href="sasamoriya/" class="card card--sasa">
        <div class="card-img" style="background-image: url('sasamoriya/images/exterior-autumn.jpg');"></div>
        <div class="card-body">
          <span class="card-label">LOG HOUSE</span>
          <h2 class="card-title">民宿笹森家</h2>
          <p class="card-sub">一棟貸しログハウス<br>最大6名・北アルプスの森</p>
          <span class="card-cta">詳しく見る</span>
        </div>
      </a>

      <a href="tomoshibi/" class="card card--tomo">
        <div class="card-img" style="background-image: url('tomoshibi/images/hero-reading.jpg');"></div>
        <div class="card-body">
          <span class="card-label">GUEST HOUSE</span>
          <h2 class="card-title">ゲストハウス灯</h2>
          <p class="card-sub">2室のゲストハウス<br>少人数・カップル向け</p>
          <span class="card-cta">詳しく見る</span>
        </div>
      </a>
    </div>

    <p class="footer-copy">&copy; 2026 Pack Vacation Co., Ltd.</p>
  </div>

  <script>
  (function(){
    var images = [
      'sasamoriya/images/exterior-autumn.jpg',
      'tomoshibi/images/hero-reading.jpg',
      'template/images/1.JPG',
      'template/images/6.JPG',
      'template/images/7.JPG',
      'template/images/11.JPG',
      'template/images/12.JPG',
      'template/images/13.JPG',
      'template/images/5.JPG',
      'template/images/15.JPG',
      'template/images/16.JPG',
      'template/images/18.JPG',
      'template/images/3.JPG',
      'template/images/4.JPG',
      'template/images/8.JPG',
      'template/images/9.JPG',
      'template/images/10.JPG',
      'template/images/14.JPG',
      'template/images/2.JPG',
      'template/images/17.JPG'
    ];
    var slides = document.querySelectorAll('.bg-slide');
    var current = 0;
    var front = 0; // which slide div is in front
    // Set first image
    slides[0].style.backgroundImage = 'url("' + images[0] + '")';
    // Preload next image
    function preload(src) {
      var img = new Image();
      img.src = src;
    }
    function nextSlide() {
      current = (current + 1) % images.length;
      var next = 1 - front;
      // Preload the next-next image
      preload(images[(current + 1) % images.length]);
      // Set new image on hidden slide
      slides[next].style.backgroundImage = 'url("' + images[current] + '")';
      // Crossfade
      slides[front].classList.remove('active');
      slides[next].classList.add('active');
      front = next;
    }
    // Preload second image
    preload(images[1]);
    setInterval(nextSlide, 6000);
  })();
  </script>
  <script src="//code.tidio.co/t0r6f6zwrmhlcc1uqusvtixq8vlpauol.js" async></script>
</body>
</html>
